
image:
  registry: docker.io
  repository: grafana/grafana
  tag: "12.3.1"

persistence:
  type: pvc
  enabled: false
  storageClassName: ebs-sc
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  finalizers:
    - kubernetes.io/pvc-protection

service:
  enabled: true
  type: NodePort
  port: 3000
  targetPort: 3000

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: "1"
    memory: 1Gi

# extraSecretMounts:
#   - name: grafana-mysql
#     secretName: grafana-mysql
#     mountPath: /etc/secrets/grafana-mysql
#     readOnly: true

podSecurityContext:
  fsGroup: 472

extraInitContainers:
  - name: init-folders
    image: busybox
    command:
      - sh
      - -c
      - |
        mkdir -p /var/lib/grafana/dashboards/OBS
    volumeMounts:
      - name: grafana-provisioning
        mountPath: /var/lib/grafana/dashboards
extraVolumeMounts:
  - name: grafana-provisioning
    mountPath: /var/lib/grafana/dashboards

envFromSecrets:
  - name: grafana-mysql

# extraVolumes:
#   - name: grafana-provisioning
#     persistentVolumeClaim:
#       claimName: grafana-provisioning-pvc


dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: OBS
        orgId: 1
        type: file
        disableDeletion: false
        allowUiUpdates: false
        editable: true
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards/OBS
          foldersFromFilesStructure: true

grafana.ini:
  database:
    type: mysql
    host: ${MYSQL_HOST}
    name: grafana
    user: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    ssl_mode: disable
  paths:
    data: /var/lib/grafana/
    logs: /var/log/grafana
    plugins: /var/lib/grafana/plugins
    provisioning: /etc/grafana/provisioning