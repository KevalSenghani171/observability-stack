mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

service:
  enabled: true
  type: ClusterIP

config:
  receivers:
    otlp:
      protocols:
        grpc: {}
        http: {}

    prometheus:
      config:
        scrape_configs:
          - job_name: 'kubernetes-pods'
            kubernetes_sd_configs:
              - role: pod

  processors:
    batch:

  exporters:
    debug:
      verbosity: basic

    prometheus:
      endpoint: "0.0.0.0:8889"

    otlp:
      endpoint: jaeger-collector.observability.svc.cluster.local:4317
      tls:
        insecure: true

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug, otlp]

      metrics:
        receivers: [otlp, prometheus]
        processors: [batch]
        exporters: [debug, prometheus]

      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]
