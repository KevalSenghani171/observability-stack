mimir:
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: s3-secret
          key: AWS_ACCESS_KEY_ID

    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: s3-secret
          key: AWS_SECRET_ACCESS_KEY
  structuredConfig:
    usage_stats:
      enabled: false
    blocks_storage:
      s3:
        bucket_name: mimir-blocks-demo
        endpoint: s3.ap-south-1.amazonaws.com
        region: ap-south-1
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
        access_key_id: ${AWS_ACCESS_KEY_ID}
    alertmanager_storage:
      s3:
        bucket_name: mimir-alertmanager-demo
        endpoint: s3.ap-south-1.amazonaws.com
        region: ap-south-1
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
        access_key_id: ${AWS_ACCESS_KEY_ID}
    ruler_storage:
      s3:
        bucket_name: mimir-ruler-demo
        endpoint: s3.ap-south-1.amazonaws.com
        region: ap-south-1
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
        access_key_id: ${AWS_ACCESS_KEY_ID}
