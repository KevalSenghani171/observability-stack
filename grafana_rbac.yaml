apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gocd-secret-manager
  namespace: devops-tools
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gocd-secret-manager-binding
  namespace: devops-tools
subjects:
- kind: ServiceAccount
  name: default
  namespace: gocd
roleRef:
  kind: Role
  name: gocd-secret-manager
  apiGroup: rbac.authorization.k8s.io