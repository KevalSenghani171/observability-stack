mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

service:
  type: ClusterIP

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317

  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318

  jaeger-ui:
    enabled: true
    containerPort: 16686
    servicePort: 16686

config:
  exporters:
    otlp/jaeger:
      endpoint: jaeger-collector.observability.svc.cluster.local:4317
      tls:
        insecure: true
  receivers:
    otlp:
      protocols:
        grpc:
        http:

  # processors:
  #   batch:

  # exporters:
  #   debug:

  extensions:
    health_check: {}
    jaeger_query:
      storage:
        traces: memory

  service:
    extensions: [health_check, jaeger_query]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]