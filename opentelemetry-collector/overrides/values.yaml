mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

service:
  otlp:
    enabled: true
  otlp-http:
    enabled: true
  jaeger-ui:            # 👈 custom port name
    enabled: true
    containerPort: 16686
    servicePort: 16686

config:
  exporters:
    otlp/jaeger:
      endpoint: jaeger-collector.observability.svc.cluster.local:4317
      tls:
        insecure: true
  receivers:
    otlp:
      protocols:
        grpc:
        http:

  # processors:
  #   batch:

  # exporters:
  #   debug:

  extensions:
    jaeger_query:
      storage:
        traces: memory

  service:
    extensions: [jaeger_query]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]