server:
  image:
    repository: quay.io/prometheus/prometheus
    tag: "v3.10.0"
  persistentVolume:
    enabled: true
    storageClass: "ebs-sc"
    accessModes:
      - ReadWriteOnce
    size: 10Gi
  service:
    enabled: true
    servicePort: 9090
    type: NodePort

extraScrapeConfigs: |
  - job_name: 'my-app'
    static_configs:
      - targets: ['my-app.default.svc.cluster.local:80']
  - job_name: 'qlik-java-app'
    static_configs:
      - targets: ['mtel-collector-opentelemetry-collector.observability.svc.cluster.local:8889']

