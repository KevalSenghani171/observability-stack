alloy:
  extraVolumes:
    - name: varlog
      hostPath:
        path: /var/log

    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers

  extraVolumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true

    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
  configMap:
    content: |-
      logging {
        level = "info"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      loki.write "loki" {
        endpoint {
          url = "http://loki.devops-tools.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.kubernetes.pods.targets
        forward_to = [loki.write.loki.receiver]
      }