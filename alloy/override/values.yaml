alloy:
  extraVolumes:
    - name: varlog
      hostPath:
        path: /var/log

  extraVolumeMounts:
    - name: varlog
      mountPath: /var/log
  config: |
    logging {
      level  = "info"
      format = "logfmt"
    }

    discovery.kubernetes "pods" {
      role = "pod"
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.kubernetes.pods.targets
      forward_to = [loki.write.default.receiver]

      labels = {
        job       = "kubernetes-pods"
        namespace = "__meta_kubernetes_namespace"
        pod       = "__meta_kubernetes_pod_name"
        container = "__meta_kubernetes_pod_container_name"
      }
    }

    loki.write "default" {
      endpoint {
        url = "http://loki.devops-tools.svc.cluster.local:3100/loki/api/v1/push"
      }
    }

    otelcol.receiver.otlp "default" {
      grpc {}
      http {}
    }

    prometheus.remote_write "default" {
      endpoint {
        url = "http://prometheus-server.devops-tools.svc.cluster.local:9090/api/v1/write"
      }
    }

    otelcol.exporter.prometheus "metrics" {
      forward_to = [prometheus.remote_write.default.receiver]
    }

    otelcol.service "default" {
      pipelines {
        metrics = {
          receivers = [otelcol.receiver.otlp.default]
          exporters = [otelcol.exporter.prometheus.metrics]
        }
      }
    }