#          - path: /
#            pathType: Prefix


deploymentMode: SingleBinary

singleBinary:
  persistence:
      whenScaled: Delete
      whenDeleted: Delete
      enableStatefulSetAutoDeletePVC: true
      enableStatefulSetRecreationForSizeChange: false
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 5Gi
      storageClass: ebs-sc
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 12Mi
  # extraEnv:
  #   # Keep a little bit lower than memory limits
  #   - name: GOMEMLIMIT
  #     value: 3750MiB
# resultsCache:
#   enabled: true
#   addresses: dnssrvnoa+_memcached-client._tcp.{{ include "loki.resourceName" (dict "ctx" $ "component" "results-cache") }}.{{ include "loki.namespace" $ }}.svc.{{ .Values.global.clusterDomain }}
#   defaultValidity: 12h
