loki:
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: s3-secret
          key: AWS_ACCESS_KEY_ID

    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: s3-secret
          key: AWS_SECRET_ACCESS_KEY
  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks-observability
      ruler: loki-ruler-s3-observability
      admin: loki-admin-observability
    s3:
      endpoint: "https://s3.ap-south-1.amazonaws.com"
      region: ap-south-1
      secret_access_key: ${AWS_SECRET_ACCESS_KEY}
      access_key_id: ${AWS_ACCESS_KEY_ID}
      signatureVersion: null
      s3ForcePathStyle: false
      insecure: false
      http_config: {}
      # -- Check https://grafana.com/docs/loki/latest/configure/#s3_storage_config for more info on how to provide a backoff_config
      backoff_config: {}
      disable_dualstack: false
    # type: s3
    # s3: 
    #   endpoint: "https://s3.ap-south-1.amazonaws.com"
    #   region: ap-south-1
    #   secret_access_key: ${AWS_SECRET_ACCESS_KEY}
    #   access_key_id: ${AWS_ACCESS_KEY_ID}
    #   bucketnames: 
    #   signatureVersion: v4
    #   s3ForcePathStyle: true

  commonConfig:
    replication_factor: 1
  memberlist: {}
  # schemaConfig:
  #   configs:
  #     - from: 2024-04-01
  #       store: tsdb
  #       object_store: s3
  #       schema: v13
  #       index:
  #         prefix: loki_index_
  #         period: 24h
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  # ingester:
  #   chunk_encoding: snappy
  # tracing:
  #   enabled: true
  # querier:
  #   # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
  #   max_concurrent: 2

#gateway:
